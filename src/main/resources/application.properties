spring.application.name=carrinho-api
# Configura o Jackson para formatar a saída JSON de forma legível (com indentação) 
spring.jackson.serialization.indent-output=true

# URL de conexão com o banco de dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/carrinho_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin

# Configurações do Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true